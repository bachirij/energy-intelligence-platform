name: Realtime Pipeline

on:
  schedule:
    - cron: "5 * * * *" # every hour at minute 5
  workflow_dispatch: # manual trigger from GitHub UI (useful for testing)

jobs:
  realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run realtime pipeline
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
        run: python main.py --steps realtime

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/realtime/ data/monitoring/
          git diff --cached --quiet || git commit -m "chore: realtime update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
